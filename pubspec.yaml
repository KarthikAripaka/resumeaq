name: interview_iq_ai
description: AI-powered interview preparation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.4.3
  supabase_flutter: ^2.5.0
  syncfusion_flutter_pdf: ^26.1.35
  speech_to_text: ^6.6.2
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  flutter_dotenv: ^5.1.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  file_picker: ^8.0.3
  google_sign_in: ^6.2.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env